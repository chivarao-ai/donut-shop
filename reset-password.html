<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Reset Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #ffe0ec 0%, #fff3e0 100%);
           min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: #fff; border-radius: 20px; padding: 2.5rem; max-width: 400px; width: 100%;
            box-shadow: 0 12px 40px rgba(0,0,0,.12); }
    h1 { color: #5c3317; font-size: 1.4rem; margin-bottom: .4rem; }
    p.sub { color: #9a7050; font-size: .9rem; margin-bottom: 1.5rem; }
    input { width: 100%; padding: .8rem 1rem; border: 2px solid #f0d0dc; border-radius: 10px;
            font-size: .95rem; margin-bottom: 1rem; font-family: inherit; }
    input:focus { outline: none; border-color: #f7567c; }
    button { width: 100%; padding: .85rem; background: #f7567c; color: #fff; border: none;
             border-radius: 50px; font-weight: 700; font-size: 1rem; cursor: pointer; }
    button:hover { background: #d63b60; }
    .msg { font-size: .9rem; margin-top: 1rem; display: none; }
    .msg.error { color: #d63b60; display: block; }
    .msg.success { color: #28a745; display: block; }
    a { color: #f7567c; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🍩 Reset Your Password</h1>
    <p class="sub">Choose a new password for your account.</p>
    <div id="form">
      <input type="password" id="pass"  placeholder="New password (min 8 characters)" />
      <input type="password" id="pass2" placeholder="Confirm new password" />
      <button onclick="submitReset()">Update Password</button>
    </div>
    <div id="msg" class="msg"></div>
  </div>

  <script>
    const token = new URLSearchParams(location.search).get('token');
    const msg = document.getElementById('msg');
    function show(text, cls) { msg.textContent = text; msg.className = 'msg ' + cls; }

    if (!token) show('This reset link is invalid. Please request a new one.', 'error');

    async function submitReset() {
      const password = document.getElementById('pass').value;
      const confirm  = document.getElementById('pass2').value;
      if (password.length < 8) return show('Password must be at least 8 characters.', 'error');
      if (password !== confirm) return show('Passwords do not match.', 'error');
      const res = await fetch('/api/customer/reset', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const data = await res.json();
      if (!res.ok) return show(data.error || 'Could not reset password.', 'error');
      document.getElementById('form').style.display = 'none';
      show('✅ Password updated! You can now log in. Redirecting…', 'success');
      setTimeout(() => location.href = '/', 2500);
    }
  </script>
</body>
</html>
